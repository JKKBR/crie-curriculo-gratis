<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Currículo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <h1>Crie seu Currículo</h1>
  <form id="formCurriculo">
    <label>Nome:</label><br>
    <input type="text" id="nome" required><br><br>

    <label>Email:</label><br>
    <input type="email" id="email" required><br><br>

    <label>Telefone:</label><br>
    <input type="tel" id="telefone" pattern="[0-9]{10,11}" placeholder="Ex: 21999999999"><br><br>

    <label>Formação:</label><br>
    <textarea id="formacao" rows="4" cols="50"></textarea><br><br>

    <label>Experiência:</label><br>
    <textarea id="experiencia" rows="6" cols="50"></textarea><br><br>

    <label>Habilidades:</label><br>
    <textarea id="habilidades" rows="4" cols="50"></textarea><br><br>

    <label>Template:</label><br>
    <select id="template">
      <option value="classico">Clássico</option>
      <option value="moderno">Moderno</option>
    </select><br><br>

    <button type="button" onclick="gerarPDF()">Gerar PDF</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
