<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Currículo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <h1>Crie seu Currículo</h1>
 <h2>Dados de Contato</h2>
<input type="tel" id="telefone" placeholder="Telefone"><br>
<input type="email" id="email" placeholder="E-mail"><br>
<input type="text" id="localizacao" placeholder="Localização"><br>
<input type="text" id="linkedin" placeholder="LinkedIn"><br>
<input type="text" id="portfolio" placeholder="Portfólio (Opcional)"><br><br>

<h2>Objetivo</h2>
<textarea id="objetivo" rows="3" cols="50"></textarea><br><br>

<h2>Experiência Profissional</h2>
<div id="experiencias"></div>
<button type="button" onclick="addExperiencia()">+ Adicionar Experiência</button><br><br>

<h2>Formação Acadêmica</h2>
<div id="formacoes"></div>
<button type="button" onclick="addFormacao()">+ Adicionar Formação</button><br><br>

<h2>Habilidades Técnicas</h2>
<div id="habilidades"></div>
<button type="button" onclick="addHabilidade()">+ Adicionar Habilidade</button><br><br>

<h2>Cursos</h2>
<div id="cursos"></div>
<button type="button" onclick="addCurso()">+ Adicionar Curso</button><br><br>

<h2>Idiomas</h2>
<div id="idiomas"></div>
<button type="button" onclick="addIdioma()">+ Adicionar Idioma</button><br><br>
  </form>

  <script src="script.js"></script>
</body>
</html>
