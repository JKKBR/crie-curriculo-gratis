<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Currículo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <h1>Crie seu Currículo</h1>
  <form id="formCurriculo">
    <label>Nome:</label><br>
    <input type="text" id="nome" required><br><br>

    <label>Email:</label><br>
    <input type="email" id="email" required><br><br>

    <label>Telefone:</label><br>
    <input type="tel" id="telefone"><br><br>

    <label>Formação:</label><br>
    <textarea id="formacao" rows="4" cols="50"></textarea><br><br>

    <label>Experiência:</label><br>
    <textarea id="experiencia" rows="6" cols="50"></textarea><br><br>

    <label>Habilidades:</label><br>
    <textarea id="habilidades" rows="4" cols="50"></textarea><br><br>

    <button type="button" onclick="gerarPDF()">Gerar PDF</button>
  </form>

  <script>
    function gerarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const telefone = document.getElementById("telefone").value;
      const formacao = document.getElementById("formacao").value;
      const experiencia = document.getElementById("experiencia").value;
      const habilidades = document.getElementById("habilidades").value;

      doc.setFontSize(16);
      doc.text("Currículo", 10, 10);

      doc.setFontSize(12);
      doc.text(`Nome: ${nome}`, 10, 20);
      doc.text(`Email: ${email}`, 10, 30);
      doc.text(`Telefone: ${telefone}`, 10, 40);

      doc.text("Formação:", 10, 50);
      doc.text(formacao, 10, 60);

      doc.text("Experiência:", 10, 80);
      doc.text(experiencia, 10, 90);

      doc.text("Habilidades:", 10, 110);
      doc.text(habilidades, 10, 120);

      doc.save("curriculo.pdf");
    }
  </script>
</body>
</html>
